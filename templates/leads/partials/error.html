<div class="bg-red-500/20 border border-red-500 text-red-100 p-6">
    <h4 class="text-lg mb-2">Ошибка отправки!</h4>
    <p class="text-sm mb-4">Пожалуйста, проверьте правильность заполнения формы:</p>
    <ul class="list-disc pl-5 text-xs text-red-200">
        {% for field in form %}
            {% for error in field.errors %}
                <li>{{ field.label }}: {{ error }}</li>
            {% endfor %}
        {% endfor %}
        {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
        {% endfor %}
    </ul>
    <button class="mt-4 text-[10px] uppercase font-bold border-b border-white hover:text-gray-300" onclick="location.reload()">Вернуться к форме</button>
</div>
